apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "ecommerce"
            - name: POSTGRES_PASSWORD
              value: "Pg1234"
            - name: POSTGRES_DB
              value: "ecommerce"

        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter
          ports:
            - containerPort: 9187
          env: 
            - name: DATA_SOURCE_URI
              value: "localhost:5432/ecommerce?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: "ecommerce"
            - name: DATA_SOURCE_PASS
              value: "Pg1234"
---
#Service Postgres Exporter (não obrigatório)
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
spec:
  selector:
    app: postgres
  type: LoadBalancer
  ports:
    - port: 9187
      targetPort: 9187          
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
spec:
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
      labels:
        app: ecommerce-app
    spec:
      containers:
        - name: ecommerce-app
          image: danferreira011/fake-shop:v1
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              value: "ecommerce"
            - name: DB_PASSWORD
              value: "Pg1234"
            - name: DB_NAME
              value: "ecommerce"
            - name: DB_PORT
              value: "5432"
            - name: FLASK_APP
              value: "index.py"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  type: LoadBalancer
  selector:
    app: ecommerce-app
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
